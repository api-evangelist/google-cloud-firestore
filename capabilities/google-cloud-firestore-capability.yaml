          in: path
          type: string
          required: true
        - name: database
          in: path
          type: string
          required: true
        - name: collectionId
          in: path
          type: string
          required: true
        - name: documentId
          in: query
          type: string
          description: Optional client-assigned document ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-project-databases-database-documents-co
