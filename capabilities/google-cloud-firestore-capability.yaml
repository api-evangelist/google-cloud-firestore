        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletedatabase
        method: DELETE
        description: Google Cloud Firestore Delete a database
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: database
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-project-databases-database-documents-co
      path: /projects/{project}/databases/{database}/documents/{collectionId}
      operations:
      - name: listdocuments
        method: GET
        description: Google Cloud Firestore List documents
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: database
          in: path
          type: string
          required: true
        - name: collectionId
          in: path
          type: string
          required: true
        - name: pageSize
          in: query
          type: integer
        - name: pageToken
          in: query
          type: string
        - name: orderBy
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
