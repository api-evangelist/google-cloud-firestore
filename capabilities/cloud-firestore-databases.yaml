naftiko: 1.0.0-alpha2
info:
  label: Google Cloud Firestore API — Databases
  description: 'Google Cloud Firestore API — Databases. 4 operations. Lead operation: Google Cloud Firestore List databases.
    Self-contained Naftiko capability covering one Google Cloud Firestore business surface.'
  tags:
  - Google Cloud Firestore
  - Databases
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_CLOUD_FIRESTORE_API_KEY: GOOGLE_CLOUD_FIRESTORE_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-firestore-databases
    baseUri: https://firestore.googleapis.com/v1
    description: Google Cloud Firestore API — Databases business capability. Self-contained, no shared references.
    resources:
    - name: projects-project-databases
      path: /projects/{project}/databases
      operations:
      - name: listdatabases
        method: GET
        description: Google Cloud Firestore List databases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
      - name: createdatabase
        method: POST
        description: Google Cloud Firestore Create a database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: databaseId
          in: query
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-project-databases-database
      path: /projects/{project}/databases/{database}
      operations:
      - name: getdatabase
        method: GET
        description: Google Cloud Firestore Get a database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: database
          in: path
          type: string
          required: true
      - name: deletedatabase
        method: DELETE
        description: Google Cloud Firestore Delete a database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: database
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GOOGLE_CLOUD_FIRESTORE_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-firestore-databases-rest
    port: 8080
    description: REST adapter for Google Cloud Firestore API — Databases. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{project}/databases
      name: projects-project-databases
      description: REST surface for projects-project-databases.
      operations:
      - method: GET
        name: listdatabases
        description: Google Cloud Firestore List databases
        call: cloud-firestore-databases.listdatabases
        with:
          project: rest.project
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdatabase
        description: Google Cloud Firestore Create a database
        call: cloud-firestore-databases.createdatabase
        with:
          project: rest.project
          databaseId: rest.databaseId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{project}/databases/{database}
      name: projects-project-databases-database
      description: REST surface for projects-project-databases-database.
      operations:
      - method: GET
        name: getdatabase
        description: Google Cloud Firestore Get a database
        call: cloud-firestore-databases.getdatabase
        with:
          project: rest.project
          database: rest.database
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedatabase
        description: Google Cloud Firestore Delete a database
        call: cloud-firestore-databases.deletedatabase
        with:
          project: rest.project
          database: rest.database
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-firestore-databases-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Cloud Firestore API — Databases. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: google-cloud-firestore-list-databases
      description: Google Cloud Firestore List databases
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-firestore-databases.listdatabases
      with:
        project: tools.project
      outputParameters:
      - type: object
        mapping: $.
    - name: google-cloud-firestore-create-database
      description: Google Cloud Firestore Create a database
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-firestore-databases.createdatabase
      with:
        project: tools.project
        databaseId: tools.databaseId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: google-cloud-firestore-get-database
      description: Google Cloud Firestore Get a database
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-firestore-databases.getdatabase
      with:
        project: tools.project
        database: tools.database
      outputParameters:
      - type: object
        mapping: $.
    - name: google-cloud-firestore-delete-database
      description: Google Cloud Firestore Delete a database
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: cloud-firestore-databases.deletedatabase
      with:
        project: tools.project
        database: tools.database
      outputParameters:
      - type: object
        mapping: $.
