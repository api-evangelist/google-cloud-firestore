apis:
- name: Cloud Firestore API
  description: The Cloud Firestore API provides RESTful access to create, read, update, and delete documents in Firestore
    databases. It supports structured queries with filters, ordering, and pagination, as well as batch operations and transactions.
    The API also enables database management, index configuration, and collection group queries for flexible data modeling
    and retrieval patterns.
