aid: google-cloud-firestore
name: Google Cloud Firestore
description: Google Cloud Firestore is a flexible, scalable NoSQL cloud database for mobile, web, and server development.
  It keeps data in sync across client apps through real-time listeners and offers offline support for mobile and web, enabling
  responsive apps that work regardless of network latency or internet connectivity. Firestore supports ACID transactions,
  automatic multi-region data replication, and strong consistency guarantees.
